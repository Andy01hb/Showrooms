name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check
      # Supabase local para los tests de integración (RLS contra DB real).
      # ubuntu-latest ya trae Docker; setup-cli instala el CLI de Supabase.
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - name: Test (con Supabase local)
        run: |
          set -a
          eval "$(supabase status -o env 2>/dev/null)"
          set +a
          SUPABASE_LOCAL_URL="$API_URL" \
          SUPABASE_LOCAL_ANON_KEY="$ANON_KEY" \
          SUPABASE_LOCAL_SERVICE_KEY="$SERVICE_ROLE_KEY" \
          npm test
      - run: npm run build
      - run: npm audit --audit-level=critical

  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx @lhci/cli autorun
